name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

env:
  PROJECT: za

concurrency:
  group: release-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  preflight:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      is_tag: ${{ steps.metadata.outputs.is_tag }}
      tag: ${{ steps.metadata.outputs.tag }}
      sha: ${{ steps.metadata.outputs.sha }}
    steps:
      - name: Resolve release tag
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CI_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        shell: bash
        run: |
          set -euo pipefail

          tag_points_to_head() {
            ref_json=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$1" 2>/dev/null || true)
            [ -n "$ref_json" ] || return 1

            ref_type=$(jq -r '.object.type // ""' <<<"$ref_json")
            ref_sha=$(jq -r '.object.sha // ""' <<<"$ref_json")
            if [ "$ref_type" = "commit" ] && [ "$ref_sha" = "$CI_HEAD_SHA" ]; then
              return 0
            fi
            if [ "$ref_type" = "tag" ]; then
              peeled_sha=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$ref_sha" --jq '.object.sha' 2>/dev/null || true)
              [ "$peeled_sha" = "$CI_HEAD_SHA" ] && return 0
            fi
            return 1
          }

          resolve_tag_for_head() {
            if [ -n "$CI_HEAD_BRANCH" ] && tag_points_to_head "$CI_HEAD_BRANCH"; then
              printf '%s\n' "$CI_HEAD_BRANCH"
              return 0
            fi

            while IFS=$'\t' read -r ref ref_type ref_sha; do
              tag=${ref#refs/tags/}
              if [ "$ref_type" = "commit" ] && [ "$ref_sha" = "$CI_HEAD_SHA" ]; then
                printf '%s\n' "$tag"
                return 0
              fi
              if [ "$ref_type" = "tag" ]; then
                peeled_sha=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$ref_sha" --jq '.object.sha' 2>/dev/null || true)
                if [ "$peeled_sha" = "$CI_HEAD_SHA" ]; then
                  printf '%s\n' "$tag"
                  return 0
                fi
              fi
            done < <(
              gh api --paginate "repos/$GITHUB_REPOSITORY/git/matching-refs/tags" \
                --jq '.[] | [.ref, .object.type, .object.sha] | @tsv'
            )

            return 1
          }

          tag=$(resolve_tag_for_head || true)
          if [ -z "$tag" ]; then
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$CI_HEAD_SHA" >> "$GITHUB_OUTPUT"

  build:
    needs: preflight
    if: ${{ needs.preflight.outputs.is_tag == 'true' }}
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            use-cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: refs/tags/${{ needs.preflight.outputs.tag }}

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.preflight.outputs.tag }}"
          echo "PROJECT_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: ". -> target"

      - name: Setup native compilation
        if: ${{ matrix.use-cross == false }}
        shell: bash
        run: |
          rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Setup cross compilation
        if: ${{ matrix.use-cross == true }}
        shell: bash
        run: |
          dir="$RUNNER_TEMP/cross"
          mkdir -p "$dir"
          echo "$dir" >> "$GITHUB_PATH"
          cd "$dir"
          curl -LSf --retry 3 --retry-delay 2 --retry-connrefused -o cross.tar.gz \
            https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz
          tar xf cross.tar.gz
          echo "RUSTFLAGS=--cfg ${{ env.PROJECT }}" >> "$GITHUB_ENV"
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            rustup run stable cargo build --release --locked --target ${{ matrix.target }}
          fi
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "BIN_NAME=${{ env.PROJECT }}.exe" >> "$GITHUB_ENV"
          else
            echo "BIN_NAME=${{ env.PROJECT }}" >> "$GITHUB_ENV"
          fi

      - name: Package
        shell: bash
        run: |
          staging="${{ env.PROJECT }}-${{ env.PROJECT_VERSION }}-${{ matrix.target }}"
          asset=""
          alias_asset=""
          mkdir "$staging"
          cp README.md LICENSE "$staging/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}" "$staging/"
            asset="$staging.zip"
            7z a "$asset" "$staging" >/dev/null
          else
            cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}" "$staging/"
            asset="$staging.tar.gz"
            tar czf "$asset" "$staging"
          fi
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl) alias_asset="${{ env.PROJECT }}-linux-amd64" ;;
            aarch64-unknown-linux-musl) alias_asset="${{ env.PROJECT }}-linux-arm64" ;;
            aarch64-apple-darwin) alias_asset="${{ env.PROJECT }}-darwin-arm64" ;;
            x86_64-pc-windows-msvc) alias_asset="${{ env.PROJECT }}-windows-amd64.exe" ;;
          esac
          if [ -n "$alias_asset" ]; then
            cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}" "$alias_asset"
          fi
          {
            echo "UPLOAD_PATHS<<EOF"
            echo "$asset"
            if [ -n "$alias_asset" ]; then
              echo "$alias_asset"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: ${{ env.UPLOAD_PATHS }}

  release:
    needs: [preflight, build]
    if: ${{ needs.preflight.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.preflight.outputs.tag }}

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.preflight.outputs.tag }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "PROJECT_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find dist -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --tag ${{ steps.version.outputs.VERSION }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Compose release notes
        shell: bash
        run: |
          cat > RELEASE_HEADER.md <<EOF
          ## Release assets

          Formal release contract:

          - Versioned archives plus \`SHA256SUMS\`
          - Stable archive layout: \`<asset-stem>/za\`, \`LICENSE\`, \`README.md\`
          - Immutable per-version assets bound to tag \`${{ steps.version.outputs.VERSION }}\`

          Platform matrix:

          - linux/amd64 (musl) -> \`za-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-musl.tar.gz\`
          - linux/amd64 (gnu) -> \`za-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz\`
          - linux/arm64 (musl) -> \`za-${{ steps.version.outputs.VERSION }}-aarch64-unknown-linux-musl.tar.gz\`
          - darwin/arm64 -> \`za-${{ steps.version.outputs.VERSION }}-aarch64-apple-darwin.tar.gz\`
          - windows/amd64 -> \`za-${{ steps.version.outputs.VERSION }}-x86_64-pc-windows-msvc.zip\`

          Convenience aliases:

          - \`za-linux-amd64\`
          - \`za-linux-arm64\`
          - \`za-darwin-arm64\`
          - \`za-windows-amd64.exe\`

          Convenience aliases are intended for manual latest installs. Pinned automation SHOULD prefer versioned archives plus \`SHA256SUMS\`.

          EOF
          cat RELEASE_HEADER.md RELEASE_NOTES.md > RELEASE_NOTES.full
          mv RELEASE_NOTES.full RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.VERSION }}"
          title="za ${tag}"
          mapfile -t assets < <(find dist -maxdepth 2 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist/"
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists. Refusing to replace assets for an immutable version."
            exit 1
          fi
          gh release create "$tag" "${assets[@]}" --title "$title" --notes-file RELEASE_NOTES.md
